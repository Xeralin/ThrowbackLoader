name: Release zip

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: fedora:44
    steps:
      - name: Install build deps
        run: dnf install -y mingw64-gcc-c++ cmake ninja-build zip git gh
      - uses: actions/checkout@v4
      - name: Build release zip
        run: bash build.sh
      - name: Attach zip to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.event.release.tag_name }}" ThrowbackLoader-*.zip --clobber
